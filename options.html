<!DOCTYPE html>
<html>
<head>
  <title>NYU Library Proxy Configuration</title>
  <meta charset="utf-8">
  <style>
    body {
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 600px;
      margin: 0 auto;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      font-size: 14px;
    }
    button {
      padding: 8px 15px;
      background-color: #57068c;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #400366;
    }
    .status {
      margin-top: 10px;
      font-size: 14px;
      color: green;
    }
  </style>
</head>
<body>
  <h2>Proxy Configuration</h2>
  <div class="form-group">
    <label for="proxyPrefix">Proxy URL Prefix:</label>
    <input type="text" id="proxyPrefix" placeholder="https://proxy.library.nyu.edu/login?url=">
  </div>
  <button id="saveBtn">Save Configuration</button>
  <div id="status" class="status"></div>
  <script src="options.js"></script>
</body>
</html>
